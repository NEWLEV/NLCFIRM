<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - NLC Firm</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top right, #f8fafc, #eff6ff);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo img {
            width: 140px;
        }
        h2 {
            font-family: 'Playfair Display', serif;
            color: #0f172a;
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        p.subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #334155;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #c5a059;
            box-shadow: 0 0 0 3px rgba(197, 160, 89, 0.1);
        }
        .btn {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.15);
        }
        .links {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
        }
        .links a {
            color: #c5a059;
            text-decoration: none;
            font-weight: 500;
        }
        .message {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            display: none;
            font-size: 0.9rem;
        }
        .message.success {
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
            display: block;
        }
        .message.error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <img src="/assets/images/logo-stacked.png" alt="NLC Firm">
        </div>
        <h2>Reset Password</h2>
        <p class="subtitle">Enter your email and we'll send you a link to reset your password.</p>
        
        <div id="message" class="message"></div>
        
        <form id="forgotForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="name@company.com">
            </div>
            <button type="submit" class="btn">Send Reset Link</button>
        </form>
        
        <div class="links">
            <a href="/portal-login.html">Back to Login</a>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = e.target.querySelector('button');
            const msgDiv = document.getElementById('message');
            
            btn.disabled = true;
            btn.textContent = 'Sending...';
            msgDiv.className = 'message';
            msgDiv.style.display = 'none';

            try {
                const response = await fetch('/api/client/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                msgDiv.textContent = data.message || data.error;
                msgDiv.className = `message ${response.ok ? 'success' : 'error'}`;
                
                if (response.ok) {
                    e.target.style.display = 'none';
                }
            } catch (err) {
                msgDiv.textContent = 'Network error. Please try again.';
                msgDiv.className = 'message error';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Reset Link';
            }
        });
    </script>
</body>
</html>
