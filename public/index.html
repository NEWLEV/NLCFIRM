        <div class="step-dot"></div>
        <div class="step-dot"></div>
      </div>

      <!-- Step 1: Basics -->
      <div id="form-step-1" class="form-step active">
        <div class="form-field">
          <label for="f-first">First Name *</label>
          <input type="text" id="f-first" placeholder="Jane">
        </div>
        <div class="form-field">
          <label for="f-last">Last Name *</label>
          <input type="text" id="f-last" placeholder="Smith">
        </div>
        <div class="form-field">
          <label for="f-email">Work Email *</label>
          <input type="email" id="f-email" placeholder="jane@organization.com">
        </div>
        <button class="btn btn-gold full-width u-mt-1" onclick="nextStep(2)">Continue</button>
      </div>

      <!-- Step 2: Details -->
      <div id="form-step-2" class="form-step">
        <div class="form-field">
          <label for="f-org">Organization Name</label>
          <input type="text" id="f-org" placeholder="Acme Health">
        </div>
        <div class="form-field">
          <label for="f-size">Organization Size</label>
          <select id="f-size">
            <option value="1-10">1-10 employees</option>
            <option value="11-50">11-50 employees</option>
            <option value="51-200">51-200 employees</option>
            <option value="201+">201+ employees</option>
          </select>
        </div>
        <div class="form-field">
          <label for="f-industry">Industry</label>
          <select id="f-industry">
            <option value="healthcare">Healthcare / Medical Practice</option>
            <option value="nonprofit">Nonprofit / NGO</option>
            <option value="tech">Technology / Startup</option>
            <option value="other">Other Business</option>
          </select>
        </div>
        <div class="u-flex-gap-1 u-mt-1">
          <button class="btn btn-outline full-width" onclick="nextStep(1)">Back</button>
          <button class="btn btn-gold full-width" onclick="nextStep(3)">Continue</button>
        </div>
      </div>

      <!-- Step 3: Message & Submit -->
      <div id="form-step-3" class="form-step">
        <div class="form-field">
          <label for="f-contact">Preferred Contact Method</label>
          <select id="f-contact">
            <option value="email">Email</option>
            <option value="phone">Phone Call</option>
            <option value="zoom">Video Call (Zoom)</option>
          </select>
        </div>
        <div class="form-field">
          <label for="f-msg">How can we help? (Optional)</label>
          <textarea id="f-msg" rows="4" placeholder="Briefly describe your current challenges..."></textarea>
        </div>
        <div class="u-flex-gap-1 u-mt-1">
          <button class="btn btn-outline full-width" onclick="nextStep(2)">Back</button>
          <button class="btn btn-gold full-width" onclick="submitModal()">Get Started Now</button>
        </div>
      </div>

    </div>
  </div>

  <div id="social-toast" class="social-proof-toast">
    <div class="spt-avatar" id="toast-avatar"></div>
    <div class="spt-content">
      <div class="spt-text" id="toast-text"></div>
      <div class="spt-time" id="toast-time"></div>
    </div>
  </div>

  <div id="cookie-bar" class="cookie-bar">
    <div class="cookie-text">We use cookies to improve your experience and analyze site traffic. By continuing, you agree to our <a href="/privacy.html">Privacy Policy</a>.</div>
    <div class="cookie-btns">
      <button class="btn btn-outline btn-sm" onclick="declineCookies()">Decline</button>
      <button class="btn btn-gold btn-sm" onclick="acceptCookies()">Accept</button>
    </div>
  </div>

  <script src="/assets/js/main.js"></script>
  <script>
    // Announcement Banner — reads from server-injected settings
    (function(){
      try {
        var s = window.NLC_SETTINGS || {};
        if (s.banner_enabled === '1' && s.banner_text) {
          var el = document.getElementById('site-banner');
          document.getElementById('site-banner-text').textContent = s.banner_text;
          if (s.banner_link) {
            var la = document.getElementById('site-banner-link');
            la.href = s.banner_link;
            la.textContent = 'Learn More';
            la.style.display = 'inline';
          }
          if (s.banner_color) el.style.background = s.banner_color;
          el.style.display = 'block';
        }
      } catch(e) { console.error('Banner error:', e); }
    })();
  </script>
</body>
</html>
