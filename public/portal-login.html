<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Portal — New Level Consultants</title>
  <meta name="description" content="Log in to access your digital tools, assessments, and client retainer portal.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/assets/images/logo-stacked.png">
  <link rel="stylesheet" href="/assets/css/styles.css">
  <style>
    body { background-color: var(--color-bg); min-height: 100vh; display: flex; flex-direction: column; }
    .portal-header { text-align: center; padding: 2rem; border-bottom: 1px solid var(--color-gold-opacity); background: #fff; }
    .portal-main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .auth-container { background: #fff; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); overflow: hidden; max-width: 480px; width: 100%; border: 1px solid var(--color-gold-opacity); }
    
    .auth-tabs { display: flex; border-bottom: 1px solid var(--color-gold-opacity); }
    .auth-tab { flex: 1; text-align: center; padding: 1.25rem; background: var(--color-bg); color: var(--color-slate); font-weight: 600; cursor: pointer; transition: 0.3s; border: none; font-size: 1rem; }
    .auth-tab.active { background: #fff; color: var(--color-navy); border-bottom: 3px solid var(--color-gold); }
    
    .auth-body { padding: 2rem; }
    .auth-form { display: none; }
    .auth-form.active { display: block; }
    
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; font-size: 0.875rem; font-weight: 600; color: var(--color-navy); margin-bottom: 0.5rem; }
    .form-group input { width: 100%; padding: 0.75rem 1rem; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem; transition: 0.3s; outline: none; }
    .form-group input:focus { border-color: var(--color-gold); box-shadow: 0 0 0 3px var(--color-gold-opacity); }
    
    .error-box { background: #fee2e2; color: #b91c1c; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.875rem; display: none; }
    .success-box { background: #dcfce7; color: #15803d; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.875rem; display: none; }
  </style>
</head>
<body>

  <header class="portal-header">
    <a href="/"><img src="/assets/images/logo-stacked.png" alt="NLC Logo" height="60"></a>
  </header>

  <main class="portal-main">
    <div class="auth-container">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" onclick="switchTab('register')">Create Account</button>
      </div>

      <div class="auth-body">
        <div id="auth-error" class="error-box"></div>
        <div id="auth-success" class="success-box"></div>

        <!-- Login Form -->
        <form id="form-login" class="auth-form active">
          <div class="form-group">
            <label for="login-email">Email Address</label>
            <input type="email" id="login-email" name="email" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" name="password" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-gold w-full" id="btn-login">Access Portal</button>
        </form>

        <!-- Register Form -->
        <form id="form-register" class="auth-form">
          <div class="u-grid-2 u-flex-gap-1">
            <div class="form-group">
              <label for="reg-first">First Name</label>
              <input type="text" id="reg-first" name="firstName" required autocomplete="given-name">
            </div>
            <div class="form-group">
              <label for="reg-last">Last Name</label>
              <input type="text" id="reg-last" name="lastName" required autocomplete="family-name">
            </div>
          </div>
          <div class="form-group">
            <label for="reg-email">Email Address</label>
            <input type="email" id="reg-email" name="email" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="reg-company">Company / Organization (Optional)</label>
            <input type="text" id="reg-company" name="company" autocomplete="organization">
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" name="password" required autocomplete="new-password" minlength="8" placeholder="Min. 8 characters">
          </div>
          <button type="submit" class="btn btn-dark w-full" id="btn-register">Create Account</button>
        </form>

      </div>
    </div>
  </main>

  <script src="/assets/js/portal-auth.js" defer></script>
  <script>
    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      document.getElementById('auth-error').style.display = 'none';
      document.getElementById('auth-success').style.display = 'none';

      if(tab === 'login') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('form-login').classList.add('active');
      } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('form-register').classList.add('active');
      }
    }
  </script>
</body>
</html>
